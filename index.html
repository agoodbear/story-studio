<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IG 限動排版工作室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Long+Cang&family=Gochi+Hand&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css?v=4">
</head>
<body>
<header class="topbar">
  <div class="brand">📸 IG 限動排版工作室</div>
  <div class="sub">上傳照片 → 選風格＆版面 → 即時預覽 → 匯出 1080×1920</div>
</header>

<main class="layout">
  <!-- 左欄：上傳 + 照片匣 -->
  <section class="panel photos-panel">
    <h2>1 · 照片</h2>
    <label class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
      <div class="dz-inner">
        <div class="dz-icon">＋</div>
        <div>拖曳或點選上傳照片<br><small>支援 HEIC / JPG，自動轉正＋依時間排序</small></div>
      </div>
    </label>
    <div class="tray-head">
      <span id="photoCount">0 張</span>
      <button class="mini" id="sortTimeBtn" title="依拍攝時間排序">⏱ 時間排序</button>
      <button class="mini danger" id="clearBtn">清空</button>
    </div>
    <div class="tray" id="tray"></div>
    <p class="hint">三種加照片方式：① 上傳到下方照片匣再點縮圖指派　② <b>直接點右側預覽格子的「＋」</b>選照片（手機會開相簿）　③ 從 Photos／Finder <b>拖照片到格子</b>。</p>
  </section>

  <!-- 中欄：控制 -->
  <section class="panel controls-panel">
    <h2>2 · 風格</h2>
    <div class="cards" id="styleCards"></div>

    <h2>3 · 版面</h2>
    <div class="cards" id="layoutCards"></div>

    <h2>4 · 這一格的文字</h2>
    <div class="texts">
      <label>主標 <input type="text" id="txtTitle" placeholder="今日早餐"></label>
      <label>副標 / 手寫 <input type="text" id="txtCaption" placeholder="值班前的第一杯"></label>
      <label>標籤 <input type="text" id="txtTag" placeholder="#早餐"></label>
      <label class="row"><span>日期戳記</span><input type="checkbox" id="txtDateOn" checked></label>
    </div>

    <h2>5 · 故事分頁</h2>
    <div class="frames" id="frames"></div>
    <div class="frame-actions">
      <button class="mini" id="addFrameBtn">＋ 新增一頁</button>
      <button class="mini" id="autoFillBtn" title="把照片依時間自動分配到各頁">✨ 自動排版</button>
    </div>
  </section>

  <!-- 右欄：預覽 -->
  <section class="panel preview-panel">
    <h2>預覽 <span class="ratio">9:16 · 1080×1920</span></h2>
    <div class="stage-wrap">
      <div class="stage-holder"><div class="stage" id="stage"></div></div>
    </div>
    <div class="export-row">
      <button class="primary" id="exportBtn">⬇ 匯出這一頁 JPG</button>
      <button class="primary ghost" id="exportAllBtn">⬇ 匯出全部頁</button>
    </div>
    <p class="hint" id="status"></p>
  </section>
</main>

<!-- 隱藏的全尺寸算圖舞台（匯出用） -->
<div class="render-stage-holder"><div class="stage render-stage" id="renderStage"></div></div>

<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<script src="./app.js?v=4"></script>
</body>
</html>
